<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <!-- Google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <!-- <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/> -->

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/x.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <title>Sam Abdulhameed</title>
</head>
<body style="margin: 0;">
  <!-- Loading screen overlay -->
  <div id="loadingScreen"></div>
  
  <!-- Pull-cord canvas (sits over the page but doesn't block clicks) -->
  <canvas id="ropeCanvas"></canvas>
  <div id="ropeTabWrapper" class="rope-tab-wrapper" aria-hidden="true">
    <img id="ropeTab" class="rope-tab pixel-art" src="assets/images/pull-white.svg" alt="">
  </div>

  <div class="header"></div>
  
  <!-- Main content container for proper centering -->
  <div class="main-content">
    <div class="hero-content">
      <!-- <div class="other">Skills Projects</div> -->
      <div class="name">Sam Abdulhameed</div>
      <div class="subname">
        CS Major + Business Minor @&nbsp;
        <a class="mac" href="https://www.mcmaster.ca/" target="_blank" style="text-decoration: none;">McMaster University</a>
      </div>

      <nav class="middle icon-row">
        <!-- GitHub -->
        <div class="github-box">
        <a class="icon-link" href="https://github.com/oakflow" target="_blank" aria-label="GitHub">
          <img class="githubicon icon-dark"  src="assets/icons/github-white.png"  alt="">
          <img class="githubicon icon-light" src="assets/icons/github-black.png"  alt="">
        </a>
        </div>

        <!-- Email -->
        <div class="email-box">
        <a class="icon-link" href="mailto:sam@a-s.am" aria-label="Email">
          <img class="emailicon icon-dark"  src="assets/icons/email-white.png"    alt="">
          <img class="emailicon icon-light" src="assets/icons/email-black.png"    alt="">
        </a>
        </div>

        <!-- LinkedIn -->
        <div class="linkedin-box">
        <a class="icon-link" href="https://linkedin.com/in/sam-a-1ba475292" target="_blank" aria-label="LinkedIn">
          <img class="linkedinicon icon-dark"  src="assets/icons/linkedin-white.png" alt="">
          <img class="linkedinicon icon-light" src="assets/icons/linkedin-black.png" alt="">
        </a>
        </div>

      </nav>
    </div>
  </div>



  
  <div class="footer">© 2026</div>
  <div class="footerdummy"></div>

  
  <script src="js/rope.js" defer></script>
  <script src="js/iconshatter.js" defer></script>
  <script>
    (() => {
      const name = document.querySelector('.name');
      const hero = document.querySelector('.hero-content');

      if (!name || !hero) return;

      const syncHeroWidth = () => {
        hero.style.setProperty('--hero-width', `${Math.ceil(name.getBoundingClientRect().width)}px`);
      };

      const scheduleSync = () => requestAnimationFrame(syncHeroWidth);

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(scheduleSync);
      }

      if (window.ResizeObserver) {
        const observer = new ResizeObserver(scheduleSync);
        observer.observe(name);
      } else {
        window.addEventListener('resize', scheduleSync);
      }

      scheduleSync();
    })();
  </script>
</body>
</html>
